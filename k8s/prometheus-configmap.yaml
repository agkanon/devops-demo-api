apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'node-api'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['api-service.devops-demo.svc.cluster.local:3000']

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
