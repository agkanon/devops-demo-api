apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: devops-demo
  annotations:
    # Basic annotations for nginx-ingress controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Optional: Enable CORS if needed
    # nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx   # Change to your ingress class if different
  rules:
  - host: api.devops-demo.local   # Change this to your domain (or remove for *)
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service      # ← Points directly to Node.js app service
            port:
              number: 3000
  # Optional: Health check path
  - host: api.devops-demo.local
    http:
      paths:
      - path: /status
        pathType: Exact
        backend:
          service:
            name: api-service
            port:
              number: 3000
